<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>free item</title>
    <style>
        body { background-color: #ffc0cb; font-family: sans-serif; text-align: center; }
        .btn { padding: 20px 40px; margin: 20px; font-size: 20px; cursor: pointer; border: none; background: #ff69b4; color: white; border-radius: 10px; }
        #videoContainer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: black; z-index: 9999; }
        video { width: 100%; height: 100%; }
    </style>
</head>
<body>

    <h1>free item</h1>
    <button class="btn" onclick="playVideo()">Roblox</button>
    <button class="btn" onclick="playVideo()">Free Fire</button>

    <div id="videoContainer">
        <video id="vid" controls>
            <source src="YTSave_YouTube_Jeff-the-killer-jumpscare_Media_3cyS6wMVCqI_001_360p.mp4" type="video/mp4">
        </video>
    </div>

    <script>
        function playVideo() {
            var container = document.getElementById("videoContainer");
            var vid = document.getElementById("vid");
            container.style.display = "block";
            vid.volume = 1.0;
            if (container.requestFullscreen) {
                container.requestFullscreen();
            }
            vid.play();
        }
    </script>
</body>
</html>
